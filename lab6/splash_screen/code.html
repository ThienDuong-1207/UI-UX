<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .splash-gradient {
            background: linear-gradient(135deg, #ff7a00 0%, #ff5c00 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center splash-gradient px-margin-mobile">
<!-- Background Texture Pattern -->
<div class="absolute inset-0 opacity-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-white rounded-full blur-3xl"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-5">
<div class="grid grid-cols-4 gap-xl">
<!-- Decorative Icon Pattern -->
<span class="material-symbols-outlined text-white text-9xl">restaurant</span>
<span class="material-symbols-outlined text-white text-9xl">fastfood</span>
<span class="material-symbols-outlined text-white text-9xl">lunch_dining</span>
<span class="material-symbols-outlined text-white text-9xl">local_pizza</span>
<span class="material-symbols-outlined text-white text-9xl">ramen_dining</span>
<span class="material-symbols-outlined text-white text-9xl">bakery_dining</span>
<span class="material-symbols-outlined text-white text-9xl">icecream</span>
<span class="material-symbols-outlined text-white text-9xl">liquor</span>
</div>
</div>
</div>
<!-- Central Brand Identity -->
<div class="relative z-10 flex flex-col items-center gap-lg">
<!-- Logo Icon -->
<div class="w-32 h-32 bg-white rounded-[32px] shadow-2xl flex items-center justify-center transform hover:rotate-6 transition-transform duration-500">
<span class="material-symbols-outlined text-primary-container text-7xl select-none" data-icon="restaurant" data-weight="fill">restaurant</span>
</div>
<!-- Brand Name -->
<div class="text-center">
<h1 class="font-h1 text-[48px] leading-tight text-white tracking-tighter drop-shadow-md">
                    QuickBite
                </h1>
<div class="h-1.5 w-12 bg-white/40 rounded-full mx-auto mt-sm"></div>
</div>
</div>
<!-- Tagline & Action Prompt -->
<div class="absolute bottom-xxl left-0 w-full text-center z-10 px-margin-mobile">
<p class="font-body-lg text-white/90 font-medium mb-xl opacity-0 translate-y-4 animate-[fadeInUp_1s_ease-out_forwards]">
                Order your favorite food
            </p>
<!-- Modern Loading Indicator -->
<div class="flex justify-center items-center gap-xs">
<div class="w-2 h-2 bg-white rounded-full opacity-40"></div>
<div class="w-2 h-2 bg-white rounded-full opacity-70"></div>
<div class="w-2 h-2 bg-white rounded-full"></div>
</div>
</div>
<!-- Interactive Visual Elements -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[15%] right-[10%] rotate-12">
<img class="w-24 h-24 object-cover rounded-2xl shadow-xl border-4 border-white/20" data-alt="floating realistic 3D hamburger with melting cheese and fresh lettuce against orange background with soft shadow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCL4pQwl8aAlUG3S3U7Q2XlDWLC0Dd6FeEEDU70ZCsKeZynv8DGA_fmAXBZZysreGVI5WyfmGyH3lN8Wq51PZAPbY_p8md91z6cK0BKRKtksXQy3PzxOOLgBE4Rv-Q1s7HyatwsWC_J2VEzA-MBGfqpvmoxocXIA-hyt8WmhTAK64_abAK1Ah63iF-qKcBVhHk8oFCnpXLrEfxCSWJD8WAefjVnG8w2viV9iZ8j83IrDTJ1LWYkGwbMHUSqZdY5MFeqVR0XPILmYg"/>
</div>
<div class="absolute bottom-[25%] left-[8%] -rotate-12">
<img class="w-20 h-20 object-cover rounded-2xl shadow-xl border-4 border-white/20" data-alt="floating 3D bowl of fresh healthy salad with avocado slices and vibrant vegetables on orange background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdMi0oKhX5hM2sQKhFvAYedbk5kInMpnV9d0kRnLWI9KSxESDTi0jrn73GxPOQrasWUM8v2ER5MMQHZgd26nGLoiOH3vEFgGlRDSzaV8o6H6Mwwf5XLJmftoXezwbagkHEZKTXAA9BX9FWJmAp3cdwarpE8Yu-imkQShMPqlaVqIHPr-1_BsbLJUe5UoUcC7D-dCTxuBTaMyygBBMR55m43dj63Mzjmh6lWYHuSRgMH7HaAd685P28Fw_9H5RQv1QNgYGz7wsF5g"/>
</div>
</div>
</main>
<!-- Custom Animation Keyframes (Embedded for simplicity in single-page task) -->
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</body></html>
